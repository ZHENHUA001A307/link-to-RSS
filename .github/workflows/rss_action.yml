name: Daily RSS Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate RSS and Update Progress
        shell: python
        run: |
          import os, datetime, csv, re

          # 1. 确保进度文件存在
          if not os.path.exists('progress.txt'):
              with open('progress.txt', 'w') as f: f.write("0")

          with open('progress.txt', 'r') as f:
              try:
                  idx = int(f.read().strip())
              except:
                  idx = 0

          # 2. 读取 CSV 数据
          rows = []
          if os.path.exists('manga.csv'):
              with open('manga.csv', 'r', encoding='utf-8') as f:
                  reader = csv.reader(f)
                  rows = [row for row in reader if row]
                  if len(rows) > 0:
                      # 跳过表头
                      rows = rows[1:]

          if idx >= len(rows):
              print("所有记录已更新完毕！")
              exit(0)

          # 3. 提取当前行数据并构造新 Item
          current_row = rows[idx]
          title = current_row[0].strip() if len(current_row) > 0 else "无标题"
          link = current_row[1].strip() if len(current_row) > 1 else ""
          content = current_row[2].strip() if len(current_row) > 2 else ""
          
          now = datetime.datetime.now().strftime('%a, %d %b %Y %H:%M:%S +0000')
          
          # 构造新条目字符串
          new_item = f"""    <item>
      <title><![CDATA[{title}]]></title>
      <link>{link}</link>
      <description><![CDATA[{content}]]></description>
      <guid isPermaLink="false">manga-idx-{idx}</guid>
      <pubDate>{now}</pubDate>
    </item>"""

          # 4. 读取旧 Feed 并合并条目 (核心逻辑)
          all_items = [new_item]
          if os.path.exists('feed.xml'):
              with open('feed.xml', 'r', encoding='utf-8') as f:
                  old_content = f.read()
                  # 使用正则提取现有的所有 <item> 块
                  old_items = re.findall(r'<item>.*?</item>', old_content, re.DOTALL)
                  all_items.extend(old_items)

          # 只保留最近的 15 个条目
          all_items = all_items[:15]
          items_xml = "\n".join(all_items)

          # 5. 生成最终的 RSS XML
          rss_full = f"""<?xml version="1.0" encoding="UTF-8" ?>
<rss version="2.0">
<channel>
  <title>每日更新推送</title>
  <link>https://github.com/{{{{ github.repository }}}}</link>
  <description>从 CSV 自动生成的更新推送</description>
{items_xml}
</channel>
</rss>"""

          # 6. 保存并更新进度
          with open('feed.xml', 'w', encoding='utf-8') as f:
              f.write(rss_full)
          
          with open('progress.txt', 'w') as f:
              f.write(str(idx + 1))

          print(f"✅ 今日推送: {title}")

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add progress.txt feed.xml
          git commit -m "Update RSS Feed: $(date)" || exit 0
          git push

name: Daily RSS Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate RSS and Update Progress
        shell: python
        run: |
          import os, datetime

          with open('progress.txt', 'r') as f:
              idx = int(f.read().strip())

          with open('manga.csv', 'r', encoding='utf-8') as f:
              lines = [l.strip() for l in f.readlines() if l.strip()]
              lines = lines[1:] # 跳过表头

          if idx >= len(lines):
              print("已经全部更新完了！")
              exit(0)

          row = lines[idx]
          split_idx = row.find('https://')
          
          # 【关键修复点】：先取前半段，然后去掉两端的空格，再去掉末尾可能存在的逗号
          title = row[:split_idx].strip().rstrip(',') 
          link = row[split_idx:].strip()

          now = datetime.datetime.now().strftime('%a, %d %b %Y %H:%M:%S +0000')
          rss = f"""<?xml version="1.0" encoding="UTF-8" ?>
          <rss version="2.0">
          <channel>
            <title>漫画更新推送</title>
            <item>
              <title><![CDATA[{title}]]></title>
              <link>{link}</link>
              <guid>{link}</guid>
              <pubDate>{now}</pubDate>
            </item>
          </channel>
          </rss>"""

          with open('feed.xml', 'w', encoding='utf-8') as f:
              f.write(rss)
          
          with open('progress.txt', 'w') as f:
              f.write(str(idx + 1))

          print(f"今日推送: {title}")

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add progress.txt feed.xml
          git commit -m "Update RSS Feed: $(date)" || exit 0
          git push
